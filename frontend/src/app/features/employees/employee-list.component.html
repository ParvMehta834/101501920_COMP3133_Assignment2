<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Employee List</h2>
    <div>
      <a routerLink="/employees/add" class="btn btn-success me-2">Add Employee</a>
      <button class="btn btn-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="card shadow p-3 mb-4">
    <div class="row g-3">
      <div class="col-md-5">
        <input [(ngModel)]="designation" class="form-control" placeholder="Search by designation" />
      </div>
      <div class="col-md-5">
        <input [(ngModel)]="department" class="form-control" placeholder="Search by department" />
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" (click)="search()">Search</button>
      </div>
    </div>
  </div>

  <div class="card shadow">
    <div class="table-responsive">
      <table class="table table-bordered table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Designation</th>
            <th>Department</th>
            <th>Salary</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let emp of employees">
            <td>
              <img
                [src]="emp.employee_photo || 'https://via.placeholder.com/50'"
                width="50"
                height="50"
                class="rounded-circle"
                alt="Employee Photo"
              />
            </td>
            <td>{{ emp.first_name }} {{ emp.last_name }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.gender }}</td>
            <td>{{ emp.designation }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.salary | currency }}</td> 
          </tr>
          <tr *ngIf="employees?.length === 0">
            <td colspan="7" class="text-center">No employees found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
