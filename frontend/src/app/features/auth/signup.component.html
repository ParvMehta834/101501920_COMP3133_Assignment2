<div class="container mt-5" style="max-width: 450px;">
  <div class="card shadow p-4">
    <h2 class="text-center mb-4">Signup</h2>

    <form [formGroup]="signupForm" (ngSubmit)="signup()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" formControlName="username" />
        <small class="text-danger" *ngIf="signupForm.get('username')?.touched && signupForm.get('username')?.invalid">
          Username must be at least 3 characters.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" formControlName="email" />
        <small class="text-danger" *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid">
          Enter a valid email.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
        <small class="text-danger" *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">
          Password must be at least 6 characters.
        </small>
      </div>

      <button class="btn btn-success w-100" [disabled]="loading">
        {{ loading ? 'Signing up...' : 'Signup' }}
      </button>
    </form>

    <p class="mt-3 text-center">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
