<div class="container mt-5" style="max-width: 450px;">
  <div class="card shadow p-4">
    <h2 class="text-center mb-4">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Username or Email</label>
        <input class="form-control" formControlName="login" />
        <small class="text-danger" *ngIf="loginForm.get('login')?.touched && loginForm.get('login')?.invalid">
          Username or email is required.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
        <small class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required.
        </small>
      </div>

      <button class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="mt-3 text-center">
      No account?
      <a routerLink="/signup">Signup</a>
    </p>
  </div>
</div>
